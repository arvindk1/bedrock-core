<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🛡️ Desk Command — Institutional Options Dashboard</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=IBM+Plex+Mono:wght@400;600;700&display=swap"
    rel="stylesheet"
  />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #f1f5f9;
    }

    #root {
      min-height: 100vh;
    }

    /* Theme Toggle */
    .theme-toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 1000;
      background: #f59e0b;
      color: white;
      border: none;
      padding: 10px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 600;
      font-size: 12px;
      font-family: 'IBM Plex Mono', monospace;
    }

    .theme-toggle:hover {
      background: #fbbf24;
    }

    html.light-theme {
      color-scheme: light;
    }
  </style>
</head>
<body>
  <button class="theme-toggle" onclick="toggleTheme()">🌙 DARK / LIGHT</button>
  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    // Import Dashboard and Phase 2 components inline for demo
    const { useState, useMemo, useEffect } = React;

    // ========================================================================
    // DECISION INSPECTOR (Phase 2)
    // ========================================================================

    function DecisionInspector({ log = {} }) {
      const [expanded, setExpanded] = useState(false);

      const generateSteps = () => {
        const steps = [];
        const getTime = (offset) => {
          const d = new Date();
          d.setSeconds(d.getSeconds() + offset);
          return d.toLocaleTimeString('en-US', {
            hour12: false,
            hour: '2-digit',
            minute: '2-digit',
            second: '2-digit',
          });
        };

        steps.push({
          time: getTime(0),
          status: 'pass',
          label: 'Regime Detection',
          reason: `Volatility ${log.regime || 'HIGH'} detected. Bias: Credit spreads.`,
        });
        steps.push({
          time: getTime(1),
          status: 'pass',
          label: 'Market Data Loaded',
          reason: `Loaded option chains. Ready to scan ${log.generated || 12} candidates.`,
        });
        steps.push({
          time: getTime(2),
          status: 'pass',
          label: 'Pipeline Started',
          reason: `Generated ${log.generated || 12} candidates based on parameters.`,
        });
        steps.push({
          time: getTime(3),
          status: 'partial',
          label: 'Risk Gate',
          reason: `Rejected ${(log.generated || 12) - (log.riskPassed || 9)}. Passed: ${log.riskPassed || 9}. Reason: Gamma, concentration, max loss.`,
        });
        steps.push({
          time: getTime(4),
          status: 'partial',
          label: 'Gatekeeper',
          reason: `Rejected ${(log.riskPassed || 9) - (log.gatekeeperPassed || 6)}. Passed: ${log.gatekeeperPassed || 6}. Reason: Spreads, OI, IV rank.`,
        });
        steps.push({
          time: getTime(5),
          status: 'partial',
          label: 'Correlation Matrix',
          reason: `Rejected ${(log.gatekeeperPassed || 6) - (log.correlationPassed || 4)}. Passed: ${log.correlationPassed || 4}. Reason: Portfolio overlap.`,
        });
        steps.push({
          time: getTime(6),
          status: 'success',
          label: 'Final Selection',
          reason: `${log.finalPicks || 3} high-probability trades ranked and ready for execution.`,
        });

        return steps;
      };

      const steps = generateSteps();

      return (
        <div style={{ background: '#1e293b', border: '1px solid #475569', borderRadius: '6px', marginBottom: '32px', overflow: 'hidden' }}>
          <div
            onClick={() => setExpanded(!expanded)}
            style={{
              display: 'flex',
              justifyContent: 'space-between',
              alignItems: 'center',
              padding: '24px',
              cursor: 'pointer',
              borderBottom: '1px solid #475569',
            }}
          >
            <h3 style={{ fontFamily: 'Playfair Display', fontSize: '13px', fontWeight: 600, letterSpacing: '1px', color: '#94a3b8', textTransform: 'uppercase', margin: 0 }}>
              📋 DECISION LOGIC INSPECTOR
            </h3>
            <button style={{ background: 'none', border: 'none', color: '#f59e0b', fontSize: '14px', cursor: 'pointer' }}>
              {expanded ? '▼' : '▶'}
            </button>
          </div>

          {expanded && (
            <div style={{ padding: '24px' }}>
              {steps.map((step, idx) => {
                const statusColors = {
                  pass: '#10b981',
                  partial: '#f59e0b',
                  fail: '#ef4444',
                  success: '#3b82f6',
                };

                return (
                  <div
                    key={idx}
                    style={{
                      display: 'grid',
                      gridTemplateColumns: '40px 100px 1fr',
                      gap: '16px',
                      padding: '16px 0',
                      borderLeft: '2px solid #475569',
                      paddingLeft: '24px',
                      marginLeft: '-24px',
                    }}
                  >
                    <div style={{ fontSize: '18px', fontWeight: 700, color: statusColors[step.status], textAlign: 'center' }}>
                      {step.status === 'pass' && '✓'}
                      {step.status === 'partial' && '⊙'}
                      {step.status === 'success' && '★'}
                    </div>
                    <div style={{ fontFamily: 'IBM Plex Mono', fontSize: '12px', fontWeight: 600, color: '#94a3b8', textAlign: 'right', paddingTop: '2px' }}>
                      {step.time}
                    </div>
                    <div>
                      <div style={{ fontFamily: 'Playfair Display', fontSize: '13px', fontWeight: 600, color: '#f1f5f9', marginBottom: '4px' }}>
                        {step.label}
                      </div>
                      <div style={{ fontSize: '12px', color: '#cbd5e1', lineHeight: '1.6' }}>
                        {step.reason}
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      );
    }

    // ========================================================================
    // LIVE POSITIONS (Phase 2)
    // ========================================================================

    function LivePositions({ positions = [] }) {
      const [expandedPos, setExpandedPos] = useState(null);

      const mockPositions = [
        {
          symbol: 'SPY',
          strategy: 'Iron Condor',
          quantity: 10,
          entryPrice: 1.1,
          currentPrice: 0.45,
          deltaTotal: 45.5,
          thetaPerDay: 12.5,
          vegaTotal: -8.75,
          daysToExpiry: 35,
          alerts: ['50% profit target reached', 'Hold for theta decay'],
        },
        {
          symbol: 'TSLA',
          strategy: 'Short Put',
          quantity: 5,
          entryPrice: 2.5,
          currentPrice: 3.18,
          deltaTotal: -65,
          thetaPerDay: 8.75,
          vegaTotal: 12.3,
          daysToExpiry: 28,
          alerts: ['Delta expanded 15%', 'DTE < 30: Consider rolling'],
        },
        {
          symbol: 'NVDA',
          strategy: 'Bull Call Spread',
          quantity: 20,
          entryPrice: 0.85,
          currentPrice: 1.4,
          deltaTotal: 85,
          thetaPerDay: 3.2,
          vegaTotal: -5.1,
          daysToExpiry: 45,
          alerts: [],
        },
      ];

      const posToShow = positions.length > 0 ? positions : mockPositions;

      return (
        <div style={{ background: '#1e293b', border: '1px solid #475569', borderRadius: '6px', padding: '24px', marginBottom: '32px' }}>
          <h3 style={{ fontFamily: 'Playfair Display', fontSize: '13px', fontWeight: 600, letterSpacing: '1px', color: '#94a3b8', textTransform: 'uppercase', marginBottom: '24px' }}>
            💼 LIVE POSITIONS ({posToShow.length})
          </h3>

          <div style={{ overflowX: 'auto' }}>
            <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: '12px' }}>
              <thead style={{ borderBottom: '2px solid #f59e0b', background: 'rgba(71, 85, 105, 0.1)' }}>
                <tr>
                  <th style={{ padding: '16px', textAlign: 'left', fontWeight: 600, color: '#94a3b8', fontSize: '10px', letterSpacing: '0.5px', textTransform: 'uppercase' }}>Symbol</th>
                  <th style={{ padding: '16px', textAlign: 'left', fontWeight: 600, color: '#94a3b8', fontSize: '10px', letterSpacing: '0.5px', textTransform: 'uppercase' }}>Strategy</th>
                  <th style={{ padding: '16px', textAlign: 'center', fontWeight: 600, color: '#94a3b8', fontSize: '10px', letterSpacing: '0.5px', textTransform: 'uppercase' }}>Qty</th>
                  <th style={{ padding: '16px', textAlign: 'right', fontWeight: 600, color: '#94a3b8', fontSize: '10px', letterSpacing: '0.5px', textTransform: 'uppercase' }}>Entry</th>
                  <th style={{ padding: '16px', textAlign: 'right', fontWeight: 600, color: '#94a3b8', fontSize: '10px', letterSpacing: '0.5px', textTransform: 'uppercase' }}>Current</th>
                  <th style={{ padding: '16px', textAlign: 'right', fontWeight: 600, color: '#94a3b8', fontSize: '10px', letterSpacing: '0.5px', textTransform: 'uppercase' }}>P&L</th>
                  <th style={{ padding: '16px', textAlign: 'center', fontWeight: 600, color: '#94a3b8', fontSize: '10px', letterSpacing: '0.5px', textTransform: 'uppercase' }}>Delta</th>
                  <th style={{ padding: '16px', textAlign: 'center', fontWeight: 600, color: '#94a3b8', fontSize: '10px', letterSpacing: '0.5px', textTransform: 'uppercase' }}>Theta/Day</th>
                  <th style={{ padding: '16px', textAlign: 'center', fontWeight: 600, color: '#94a3b8', fontSize: '10px', letterSpacing: '0.5px', textTransform: 'uppercase' }}>DTE</th>
                  <th style={{ padding: '16px', textAlign: 'center', fontWeight: 600, color: '#94a3b8', fontSize: '10px', letterSpacing: '0.5px', textTransform: 'uppercase' }}>Alerts</th>
                </tr>
              </thead>
              <tbody>
                {posToShow.map((pos, idx) => {
                  const pnl = (pos.currentPrice - pos.entryPrice) * pos.quantity * 100;
                  const pnlPct = ((pos.currentPrice - pos.entryPrice) / pos.entryPrice * 100).toFixed(1);
                  const isProfit = pnl > 0;

                  return (
                    <tr key={idx} style={{ borderBottom: '1px solid #475569', cursor: 'pointer' }}>
                      <td style={{ padding: '16px', fontFamily: 'Playfair Display', fontWeight: 600, fontSize: '13px', color: '#f59e0b' }}>
                        {pos.symbol}
                      </td>
                      <td style={{ padding: '16px', color: '#f1f5f9', fontSize: '12px' }}>{pos.strategy}</td>
                      <td style={{ padding: '16px', color: '#f1f5f9', textAlign: 'center', fontFamily: 'IBM Plex Mono' }}>
                        {pos.quantity}
                      </td>
                      <td style={{ padding: '16px', color: '#cbd5e1', textAlign: 'right', fontFamily: 'IBM Plex Mono' }}>
                        ${pos.entryPrice.toFixed(2)}
                      </td>
                      <td style={{ padding: '16px', color: '#cbd5e1', textAlign: 'right', fontFamily: 'IBM Plex Mono' }}>
                        ${pos.currentPrice.toFixed(2)}
                      </td>
                      <td
                        style={{
                          padding: '16px',
                          textAlign: 'right',
                          fontFamily: 'IBM Plex Mono',
                          fontWeight: 600,
                          color: isProfit ? '#10b981' : '#ef4444',
                        }}
                      >
                        ${pnl.toFixed(0)} ({pnlPct}%)
                      </td>
                      <td style={{ padding: '16px', color: '#cbd5e1', textAlign: 'center', fontFamily: 'IBM Plex Mono' }}>
                        {pos.deltaTotal.toFixed(1)}
                      </td>
                      <td style={{ padding: '16px', color: '#10b981', textAlign: 'center', fontFamily: 'IBM Plex Mono', fontWeight: 600 }}>
                        +${pos.thetaPerDay.toFixed(2)}
                      </td>
                      <td style={{ padding: '16px', color: '#f1f5f9', textAlign: 'center', fontFamily: 'IBM Plex Mono', fontWeight: 600 }}>
                        {pos.daysToExpiry}d
                      </td>
                      <td style={{ padding: '16px', textAlign: 'center' }}>
                        {pos.alerts && pos.alerts.length > 0 ? (
                          <span style={{ display: 'inline-block', background: '#f59e0b', color: 'white', padding: '2px 6px', borderRadius: '3px', fontWeight: 700, fontSize: '10px' }}>
                            {pos.alerts.length}
                          </span>
                        ) : (
                          <span style={{ color: '#94a3b8' }}>—</span>
                        )}
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    // ========================================================================
    // MAIN APP
    // ========================================================================

    function App() {
      return (
        <div style={{ padding: '32px' }}>
          <h1 style={{ fontFamily: 'Playfair Display', fontSize: '32px', marginBottom: '32px', color: '#f59e0b' }}>
            🛡️ Desk Command Dashboard v2 — Phase 2 Preview
          </h1>

          <DecisionInspector
            log={{
              regime: 'HIGH',
              generated: 12,
              riskPassed: 9,
              gatekeeperPassed: 6,
              correlationPassed: 4,
              finalPicks: 3,
            }}
          />

          <LivePositions />
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));

    // Theme Toggle
    function toggleTheme() {
      document.documentElement.classList.toggle('light-theme');
    }
  </script>

  <!-- Load v2 CSS -->
  <link rel="stylesheet" href="dashboard-v2.css" />
  <link rel="stylesheet" href="dashboard-v2-light.css" />
  <link rel="stylesheet" href="dashboard-v2-phase2.css" />
</body>
</html>
